name: AtollCard
options:
  bundleIdPrefix: swiss.atoll
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: de

# DECISION: iOS 26 (not iOS 17+ as in the brief). Reason: lets us reuse the
# shared AtollCore + AtollDesign Swift Packages from this monorepo. AtollCal
# already lives on iOS 26 / Swift 6 / strict concurrency / Liquid Glass.
# AtollCard is part of the same ecosystem and benefits from the same auth,
# brand tokens, and avatar components — duplicating them to support iOS 17
# would cost more than the wider device reach is worth at this stage.
# Re-baseable to iOS 17 by forking AtollCore/AtollDesign into local copies.

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.8.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "XK8V89P2QV"
    CODE_SIGN_STYLE: Automatic
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

packages:
  AtollCore:
    path: ../../swift-packages/AtollCore
  AtollDesign:
    path: ../../swift-packages/AtollDesign
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  AtollCard:
    type: application
    platform: iOS
    sources:
      - path: AtollCard
      - path: AtollCardShared
    resources:
      - path: AtollCard/Assets.xcassets
    dependencies:
      - package: AtollCore
      - package: AtollDesign
      - package: supabase-swift
        product: Supabase
      - sdk: CoreNFC.framework
      - sdk: PassKit.framework
      - sdk: UserNotifications.framework
      - target: AtollCardWidget
        embed: true
    info:
      path: AtollCard/Info.plist
      properties:
        CFBundleDisplayName: AtollCard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Core NFC — needed for writing physical NFC tags with card URLs
        NFCReaderUsageDescription: "AtollCard schreibt deine Karten-URL auf physische NFC-Tags, damit Gegenüber sie mit einem Tap scannen können."
        # Camera — reserved for future "scan competitor card" feature
        NSCameraUsageDescription: "AtollCard kann später fremde QR-Codes scannen, um Kontakte zu erfassen."
        # Photo Library — for the Profilfoto picker in Settings
        NSPhotoLibraryUsageDescription: "AtollCard nutzt deine Fotomediathek, damit du ein Profilfoto für deine öffentliche Karte auswählen kannst."
        # Custom URL scheme — universal links open the same path via Atoll OS
        CFBundleURLTypes:
          - CFBundleURLName: swiss.atoll.card
            CFBundleURLSchemes:
              - atollcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: swiss.atoll.card
        CODE_SIGN_ENTITLEMENTS: AtollCard/AtollCard.entitlements
        INFOPLIST_KEY_NFCReaderUsageDescription: "AtollCard schreibt deine Karten-URL auf physische NFC-Tags."

  AtollCardWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: AtollCardWidget
      - path: AtollCardShared
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    info:
      path: AtollCardWidget/Info.plist
      properties:
        CFBundleDisplayName: AtollCard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: swiss.atoll.card.widget
        CODE_SIGN_ENTITLEMENTS: AtollCardWidget/AtollCardWidget.entitlements

  AtollCardTests:
    type: bundle.unit-test
    platform: iOS
    sources: AtollCardTests
    dependencies:
      - target: AtollCard
