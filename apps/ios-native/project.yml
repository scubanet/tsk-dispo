name: ATOLL
options:
  bundleIdPrefix: swiss.atoll
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: de

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # ← In Xcode → Target → Signing & Capabilities setzen

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  ATOLL:
    type: application
    platform: iOS
    sources:
      - path: ATOLL
    resources:
      - path: ATOLL/Resources/Assets.xcassets
    info:
      path: ATOLL/Info.plist
      properties:
        CFBundleDisplayName: ATOLL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        # Magic-Link callback custom URL scheme
        CFBundleURLTypes:
          - CFBundleURLName: swiss.atoll.app
            CFBundleURLSchemes:
              - atoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: swiss.atoll.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    dependencies:
      - package: Supabase
        product: Supabase
